<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>THIRD EYE</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

</head>

<body>

<div class="container">

<!-- INTRO -->
<section id="intro" class="screen active">
    <h1>Eclipse Veil</h1>
    <p class="tagline">Let it shatter...</p>

    <input type="text" id="username" placeholder="Enter your name">
    <button id="startBtn">ENTER</button>
</section>

<!-- GROUP SELECT -->
<section id="groupScreen" class="screen">

    <h2 class="pairTitle">Choose Group</h2>

    <div id="groupButtons" class="pairButtons"></div>

    <button id="groupContinueBtn">CONTINUE</button>

</section>

<!-- MODE -->
<section id="modeScreen" class="screen">

    <h2 class="pairTitle">Choose Mode</h2>

    <div class="modeButtons">

        <button id="groupModeBtn" class="modeBtn">
            GROUP COMPARISON (LOCKED)
        </button>

        <button id="memberModeBtn" class="modeBtn">
            MEMBER COMPARISON
        </button>

    </div>

</section>

<!-- MEMBER SELECT -->
<section id="memberScreen" class="screen">

    <h2 class="pairTitle">Choose Two Members</h2>

    <div id="selectedGroupTitle"></div>

    <div id="memberButtons" class="pairButtons"></div>

    <button id="memberContinueBtn">CONTINUE</button>

</section>

<!-- QUIZ -->
<section id="quiz" class="screen">

    <div class="questionBox">

        <h2 id="questionText">Question</h2>

        <div id="options"></div>

    </div>

</section>

<!-- LOADING -->
<section id="loading" class="screen">

    <h2>Analyzing subconscious patterns...</h2>
    <div class="loader"></div>

</section>

<!-- RESULT -->
<section id="result" class="screen">

    <h2>ANALYSIS COMPLETE</h2>

    <p id="resultText"></p>

    <div id="extraResult"></div>

    <button id="restartBtn">Restart</button>

</section>

</div>

<!-- IMPORTANT FIX: defer prevents blank screen crash -->
<script src="script.js" defer></script>

</body>
</html>
