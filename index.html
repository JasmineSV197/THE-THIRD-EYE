<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>THIRD EYE</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

    <div class="container">

        <!-- INTRO -->
        <section id="intro" class="screen active">

            <h1>THIRD EYE</h1>

            <p class="tagline">
                The subconscious remembers.
            </p>

            <input type="text" id="username" placeholder="Enter your name">

            <button id="startBtn">
                ENTER
            </button>

        </section>



        <!-- QUIZ -->
        <!-- PAIR SELECT -->

<section id="pairSelect" class="screen">

    <h2 class="pairTitle">
        Choose Two
    </h2>

    <div class="pairButtons">

       <div class="pairButtons">

    <!-- BLACKPINK -->

    <div class="pairOption" data-name="Lisa">
        Lisa
    </div>

    <div class="pairOption" data-name="Jennie">
        Jennie
    </div>

    <div class="pairOption" data-name="Rosé">
        Rosé
    </div>

    <div class="pairOption" data-name="Jisoo">
        Jisoo
    </div>

    <!-- BTS -->

    <div class="pairOption" data-name="Jungkook">
        Jungkook
    </div>

    <div class="pairOption" data-name="V">
        V
    </div>

    <div class="pairOption" data-name="Jimin">
        Jimin
    </div>

    <div class="pairOption" data-name="RM">
        RM
    </div>

    <div class="pairOption" data-name="Jin">
        Jin
    </div>

    <div class="pairOption" data-name="Suga">
        Suga
    </div>

    <div class="pairOption" data-name="J-Hope">
        J-Hope
    </div>

</div>
    <button id="continueBtn">
        CONTINUE
    </button>

</section>
        <section id="quiz" class="screen">

            <div class="questionBox">

                <h2 id="questionText">
                    Question
                </h2>

                <div id="options">

                </div>

            </div>

        </section>


        <!-- LOADING -->
        <section id="loading" class="screen">

            <h2>
                Analyzing subconscious patterns...
            </h2>

            <div class="loader"></div>

        </section>


        <!-- RESULT -->
        <section id="result" class="screen">

            <h2>
                ANALYSIS COMPLETE
            </h2>

            <p id="resultText">

            </p>

            <button id="restartBtn">
                Restart
            </button>

        </section>

    </div>

    <script src="script.js"></script>

</body>

</html>
