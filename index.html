<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THIRD EYE</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="glow glow1"></div>
<div class="glow glow2"></div>

<div class="container">

    <!-- INTRO -->
    <section class="screen active" id="intro">
        <h1>THIRD EYE</h1>
        <p>The subconscious remembers.</p>
        <button id="start">ENTER</button>
    </section>

    <!-- QUESTIONS -->
    <section class="screen" id="quiz">

        <div class="card">
            <p id="question">Question</p>
            <div id="options"></div>
        </div>

    </section>

    <!-- ANALYSIS -->
    <section class="screen" id="loading">
        <h2>Analyzing subconscious...</h2>
        <div class="loader"></div>
    </section>

    <!-- RESULT -->
    <section class="screen" id="result">
        <h2>RESULT</h2>
        <p id="output"></p>
        <button id="restart">Restart</button>
    </section>

</div>

<script src="script.js"></script>

</body>
</html>
