<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>THIRD EYE</title>

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- BACKGROUND GLOW -->
    <div class="glow glow1"></div>
    <div class="glow glow2"></div>

    <!-- MAIN CONTAINER -->
    <div class="container">

        <!-- INTRO SCREEN -->
        <section id="intro-screen" class="screen active">

            <h1 class="title">THIRD EYE</h1>

            <p class="subtitle">
                The subconscious remembers.
            </p>

            <button id="start-btn">
                ENTER
            </button>

        </section>


        <!-- QUESTION SCREEN -->
        <section id="question-screen" class="screen">

            <div class="question-box">

                <p id="question-text">
                    Question appears here...
                </p>

                <div id="answers-container">

                    <!-- Answers generated by JS -->

                </div>

            </div>

        </section>


        <!-- ANALYSIS SCREEN -->
        <section id="analysis-screen" class="screen">

            <h2 class="analysis-text">
                Analyzing subconscious patterns...
            </h2>

            <div class="loader"></div>

        </section>


        <!-- RESULT SCREEN -->
        <section id="result-screen" class="screen">

            <h2 class="result-title">
                ANALYSIS COMPLETE
            </h2>

            <p id="result-text">

                You moved on consciously.

                But emotionally,
                the original still remains.

            </p>

            <button id="restart-btn">
                Restart
            </button>

        </section>

    </div>

    <!-- JS -->
    <script src="script.js"></script>

</body>

</html>
