<!DOCTYPE html>
<html>
<head>
<title>THIRD EYE ADMIN</title>

<style>
body {
    font-family: Arial;
    background: #0b0b0b;
    color: white;
    padding: 20px;
}

h1 { color: #00ffcc; }

#loginBox {
    margin-top: 50px;
}

input, button {
    padding: 10px;
    margin: 5px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th, td {
    border: 1px solid #333;
    padding: 10px;
    text-align: center;
}

th { background: #111; }

tr:nth-child(even) { background: #1a1a1a; }
</style>
</head>

<body>

<h1>👁️ THIRD EYE ADMIN PANEL</h1>

<!-- 🔐 LOGIN -->
<div id="loginBox">
    <input type="password" id="pass" placeholder="Enter admin password">
    <button onclick="login()">Enter</button>
</div>

<!-- DATA TABLE -->
<div id="panel" style="display:none;">
<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Group</th>
            <th>Pair</th>
            <th>Conscious</th>
            <th>Subconscious</th>
            <th>%</th>
            <th>Time</th>
        </tr>
    </thead>
    <tbody id="data"></tbody>
</table>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const ADMIN_PASS = "1997"; // 👈 CHANGE THIS PASSWORD

function login(){
    const val = document.getElementById("pass").value;

    if(val !== ADMIN_PASS){
        alert("Wrong password");
        return;
    }

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("panel").style.display = "block";

    loadData();
}

/* FIREBASE */
const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "XXXX",
    appId: "XXXX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const table = document.getElementById("data");

function loadData(){

db.collection("thirdEyeResults")
.orderBy("time", "desc")
.onSnapshot(snapshot => {

    table.innerHTML = "";

    snapshot.forEach(doc => {
        const d = doc.data();

        table.innerHTML += `
        <tr>
            <td>${d.name || "-"}</td>
            <td>${d.group || "-"}</td>
            <td>${(d.pair || []).join(" vs ")}</td>
            <td>${d.conscious || "-"}</td>
            <td>${d.subconscious || "-"}</td>
            <td>${d.percent || "-"}</td>
            <td>${d.time?.toDate ? d.time.toDate().toLocaleString() : ""}</td>
        </tr>`;
    });

});
}
</script>

</body>
</html>
