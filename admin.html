<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
</head>
<body>

<h1>Third Eye Results</h1>
<div id="data"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
});

const db = firebase.firestore();

const box = document.getElementById("data");

db.collection("thirdEyeResults").get().then(snapshot => {

    snapshot.forEach(doc => {

        const d = doc.data();

        const div = document.createElement("div");

        div.innerHTML = `
            <hr>
            <b>Name:</b> ${d.name}<br>
            <b>Group:</b> ${d.group}<br>
            <b>Pair:</b> ${d.pair}<br>
            <b>Conscious:</b> ${d.conscious}<br>
            <b>Subconscious:</b> ${d.subconscious}<br>
            <b>Percent:</b> ${d.percent}
        `;

        box.appendChild(div);
    });

});
</script>

</body>
</html>
