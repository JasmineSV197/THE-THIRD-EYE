<!DOCTYPE html>
<html>
<head>
    <title>THIRD EYE ADMIN</title>

    <style>
        body {
            font-family: Arial;
            background: #0b0b0b;
            color: white;
            padding: 20px;
        }

        h1 {
            color: #00ffcc;
        }

        #loginBox {
            margin-top: 50px;
            text-align: center;
        }

        input {
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 15px;
            margin-left: 5px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #333;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #111;
        }

        tr:nth-child(even) {
            background: #1a1a1a;
        }

        #panel {
            display: none;
        }
    </style>
</head>

<body>

<h1>👁️ THIRD EYE ADMIN PANEL</h1>

<!-- 🔐 LOGIN -->
<div id="loginBox">
    <h3>Enter 4-digit Admin PIN</h3>
    <input id="pinInput" type="password" placeholder="****">
    <button onclick="checkPIN()">ENTER</button>
</div>

<!-- 📊 DATA PANEL -->
<div id="panel">

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Group</th>
                <th>Pair</th>
                <th>Result</th>
                <th>%</th>
                <th>Time</th>
            </tr>
        </thead>

        <tbody id="data"></tbody>
    </table>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "XXXX",
    appId: "XXXX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* 🔐 PIN */
const ADMIN_PIN = "1997";

/* LOGIN CHECK */
function checkPIN(){

    const input = document.getElementById("pinInput").value;

    if(input !== ADMIN_PIN){
        alert("Wrong PIN ❌");
        return;
    }

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("panel").style.display = "block";

    loadData();
}

/* 📊 LOAD FIREBASE DATA */
function loadData(){

    const table = document.getElementById("data");

    db.collection("thirdEyeResults")
    .orderBy("time", "desc")
    .onSnapshot(snapshot => {

        table.innerHTML = "";

        snapshot.forEach(doc => {
            const d = doc.data();

            const pairText = Array.isArray(d.pair)
                ? d.pair.join(" vs ")
                : "-";

            let timeText = "-";

            if(d.time?.seconds){
                timeText = new Date(d.time.seconds * 1000).toLocaleString();
            }

            table.innerHTML += `
                <tr>
                    <td>${d.name || ""}</td>
                    <td>${d.group || ""}</td>
                    <td>${pairText}</td>
                    <td>${d.result || d.subconscious || ""}</td>
                    <td>${d.percent || 0}%</td>
                    <td>${timeText}</td>
                </tr>
            `;
        });

    });
}
</script>

</body>
</html>
