<!DOCTYPE html>
<html>
<head>
    <title>THIRD EYE ADMIN</title>

    <style>
        body {
            font-family: Arial;
            background: #0b0b0b;
            color: white;
            padding: 20px;
        }

        h1 {
            color: #00ffcc;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #333;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #111;
        }

        tr:nth-child(even) {
            background: #1a1a1a;
        }

        .wrap {
            overflow-x: auto;
        }
    </style>
</head>

<body>

<h1>👁️ THIRD EYE ADMIN PANEL</h1>

<div class="wrap">
<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Group</th>
            <th>Pair</th>
            <th>Conscious</th>
            <th>Subconscious</th>
            <th>%</th>
            <th>Time</th>
        </tr>
    </thead>

    <tbody id="data"></tbody>
</table>
</div>

<!-- Firebase (compat version = easier + stable) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "XXXX",
    appId: "XXXX"
};

/* INIT */
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const table = document.getElementById("data");

/* LIVE LISTENER */
db.collection("thirdEyeResults")
.orderBy("time", "desc")
.onSnapshot(snapshot => {

    table.innerHTML = "";

    snapshot.forEach(doc => {
        const d = doc.data();

        // SAFE fallback (prevents crash)
        const pairText = Array.isArray(d.pair)
            ? d.pair.join(" vs ")
            : "N/A";

        let timeText = "N/A";

        if (d.time && d.time.seconds) {
            timeText = new Date(d.time.seconds * 1000).toLocaleString();
        } else if (d.time && d.time.toDate) {
            timeText = d.time.toDate().toLocaleString();
        }

        table.innerHTML += `
            <tr>
                <td>${d.name || ""}</td>
                <td>${d.group || ""}</td>
                <td>${pairText}</td>
                <td>${d.conscious || ""}</td>
                <td>${d.subconscious || ""}</td>
                <td>${d.percent || 0}%</td>
                <td>${timeText}</td>
            </tr>
        `;
    });

});
</script>

</body>
</html>
