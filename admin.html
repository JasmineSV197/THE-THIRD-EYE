<script>
const ADMIN_PASS = "1997";

document.getElementById("loginBtn").onclick = () => {
    if(document.getElementById("pass").value !== ADMIN_PASS){
        alert("Wrong password");
        return;
    }

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("panel").style.display = "block";
    loadData();
};

const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "the-third-eye-69578.firebaseapp.com",
    projectId: "the-third-eye-69578",
    storageBucket: "the-third-eye-69578.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const table = document.getElementById("data");

function loadData(){
    db.collection("thirdEyeResults")
    .orderBy("time","desc")
    .onSnapshot(snapshot => {

        table.innerHTML = "";

        snapshot.forEach(doc => {
            const d = doc.data();

            table.innerHTML += `
                <tr>
                    <td>${d.name || "-"}</td>
                    <td>${d.group || "-"}</td>
                    <td>${(d.pair || []).join(" vs ")}</td>
                    <td>${d.conscious || "-"}</td>
                    <td>${d.subconscious || "-"}</td>
                    <td>${d.percent || "-"}</td>
                    <td>${d.time?.toDate ? d.time.toDate().toLocaleString() : ""}</td>
                </tr>
            `;
        });

    });
}
</script>
